name: Daily Job Scraper

on:
  schedule:
    # Runs at 1:30 AM UTC = 7:00 AM IST every day
    - cron: "30 1 * * *"
  workflow_dispatch:  # Also allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to commit jobs.json back to repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 playwright
          playwright install chromium --with-deps

      - name: Run scraper
        run: python scraper.py

      - name: Commit and push updated jobs.json
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/jobs.json
          git diff --staged --quiet || git commit -m "chore: update jobs.json [$(date +'%Y-%m-%d %H:%M IST' -d '+5 hours 30 minutes')]"
          git push
